<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taschenrechner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="Calculator">
        <input type="text" id="display" disabled>
        <div class="buttons">
            <button class="clear-btn" onclick="clearDisplay()">C</button>
            <button class="divi-btn" onclick="appendTODisplay('/')">/</button>
            <button class="multi-btn" onclick="appendTODisplay('*')">*</button>
            <button class="sub-btn" onclick="appendTODisplay('-')">-</button>
            <button onclick="appendTODisplay('7')">7</button>
            <button onclick="appendTODisplay('8')">8</button>
            <button onclick="appendTODisplay('9')">9</button>
            <button class="add-btn" onclick="appendTODisplay('+')">+</button>
            <button onclick="appendTODisplay('4')">4</button>
            <button onclick="appendTODisplay('5')">5</button>
            <button onclick="appendTODisplay('6')">6</button>
            <button class="end-btn" onclick="calculate()">=</button>
            <button onclick="appendTODisplay('1')">1</button>
            <button onclick="appendTODisplay('2')">2</button>
            <button onclick="appendTODisplay('3')">3</button>
            <button class="dot-btn" onclick="appendTODisplay('.')">.</button>
            <button onclick="appendTODisplay('0')">0</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
